<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
                
        body 
        {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: oldlace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }


        #display 
        {
            background: rgb(184, 145, 157);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 320px;
     }


        input[type="text"] 
        {
            width: 90%;
            background: rgb(228, 167, 187);
            border: none;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            color: mediumvioletred;
            font-size: 28px;
            text-align: right;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        button 
        {
            width: 65px;
            height: 60px;
            margin: 5px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: rgb(111, 94, 73);
            color: white;
            transition: all 0.2s ease;
        }


        button:active 
        {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        #add, #subtract, #multiply, #divide 
        {
            background: rgb(104, 151, 151);
            color: #ffa500;
}

        #add:hover, #subtract:hover, #multiply:hover, #divide:hover 
        {
            background: #ffa500;
            color: white;
        }

        #equals
        {
            background: #4CAF50;
            color: white;
            width: 65px;
        }

        #equals:hover 
        {
            background: yellowgreen;
            /* box-shadow: 0 0 15px #65a567; */
        }


        #clear
        {
            background: rgba(196, 125, 121, 0.2);
            color: #733a37;
        }

        #clear:hover 
        {
            background: #ff453a;
            color: white;
        }


        button:hover 
        {
            background: rgb(93, 65, 32);
        }
        
    

       

    </style>
</head>
<body>
    <div id="display">
    <!-- <input type="text" id="input1"><br><br> -->
    <input type="text" id="input1" readonly><br><br>
    <button id="one">1</button>
    <button id="two">2</button>
    <button id="three">3</button>
    <button id="add">+</button><br><br>   
    <button id="four">4</button>
    <button id="five">5</button>
    <button id="six">6</button>
    <button id="subtract">-</button><br><br>
    <button id="seven">7</button>
    <button id="eight">8</button>
    <button id="nine">9</button>
    <button id="multiply">*</button><br><br>
    <button id="clear">AC</button>
    <button id="zero">0</button>
    <button id="equals">=</button>
    <button id="divide">/</button>
    
    </div>
    
    

    <script type="module" src="./main.js"></script>
</body>
</html>
